<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arovia Bangladesh Online Office</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:350px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,.2);
text-align:center;
}

h1{
color:#0b8f45;
margin-bottom:10px;
}

p{
margin-bottom:20px;
color:#666;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#0b8f45;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#08753a;
}

#dashboard{
display:none;
text-align:left;
}

.card{
background:#eaf7ef;
padding:15px;
margin:10px 0;
border-radius:8px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<div id="login">

<h1>Arovia Bangladesh</h1>

<p>Together for a Better Tomorrow</p>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="dashboard">

<h1>Admin Dashboard</h1>

<div class="card">📅 Attendance</div>

<div class="card">📁 File Upload</div>

<div class="card">📢 Notice Board</div>

<div class="card">📆 Events</div>

<div class="card">👥 Employees</div>

</div>

</div>

<script>
function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username==="admin" && password==="1234"){

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

}else{

alert("Wrong Username or Password");

}

}
</script>

</body>
</html>
