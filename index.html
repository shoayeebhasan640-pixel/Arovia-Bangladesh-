<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arovia Bangladesh Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b8f45;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#fff;
padding:30px;
width:320px;
border-radius:10px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

h2{
color:#0b8f45;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0b8f45;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#08753a;
}

#dashboard{
display:none;
text-align:center;
}

.card{
background:#f4f4f4;
padding:15px;
margin:10px 0;
border-radius:8px;
}
</style>

</head>

<body>

<div class="box">

<div id="login">

<h2>Arovia Bangladesh</h2>

<p>Together for a Better Tomorrow</p>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="dashboard">

<h2>Admin Dashboard</h2>

<div class="card">Attendance</div>

<div class="card">File Upload</div>

<div class="card">Notice Board</div>

<div class="card">Events</div>

</div>

</div>

<script>

function login(){

let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;

if(u=="admin" && p=="1234"){

document.getElementById("login").style.display="none";

document.getElementById("dashboard").style.display="block";

}else{

alert("Wrong Username or Password");

}

}

</script>

</body>
</html>
